spring:
  rabbitmq:
    dynamic: false
    listener:
      simple:
        auto-startup: false

pas:
  ai:
    base-url: https://api.deepseek.com
    model: deepseek-chat
    api-key-env: DEEPSEEK_API_KEY
    confidence-threshold: 0.8
  export:
    worker-base-url: http://localhost:8000
    freeze-estimate: 18
    download-root: E:/CodeHome/LogicProjector/FastBackend/outputs
  queue:
    exchange: pas.task.direct
    dead-letter-exchange: pas.dlx.direct
    generation-routing-key: generation.task
    export-routing-key: export.task
    generation-dlq-routing-key: generation.dlq
    export-dlq-routing-key: export.dlq
